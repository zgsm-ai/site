name: Blog Content Rebuild

on:
  repository_dispatch:
    types: [blog-content-updated]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch blog content
        run: node scripts/fetch-blog-data.js
        env:
          BLOG_CONTENT_REPO_URL: https://github.com/xiaojingming/costrict-blog-content.git

      - name: Build
        run: pnpm build

      - name: Compress dist
        run: tar -czvf dist.tar.gz -C dist .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: dist.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            set -e
            REMOTE_DIST="/home/zhuge/zhuge_web/dist"
            REMOTE_BAK="/home/zhuge/zhuge_web/dist_bak"

            # 1. 备份旧版本（复制内容，不是移动！）
            rm -rf "$REMOTE_BAK"
            cp -r "$REMOTE_DIST" "$REMOTE_BAK"

            # 2. 清空旧 dist 内容（★ 保留 dist 目录本身的 inode！)
            rm -rf "$REMOTE_DIST"/*

            # 3. 直接解压到现有 dist 目录内
            tar -xzvf /tmp/dist.tar.gz -C "$REMOTE_DIST"
            rm -f /tmp/dist.tar.gz

            # 4. 修复权限（★ 关键！确保 Nginx 可读）
            chmod -R 755 "$REMOTE_DIST"

            # 5. 通知 Nginx 重载（清除文件缓存）
            docker exec costrict-ai nginx -s reload || true

            echo "Blog rebuild deployed successfully!"